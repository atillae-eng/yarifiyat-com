<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="200" height="120" rx="20" fill="url(#grad)" filter="url(#shadow)" />
  <text x="100" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">
    YARİFİYAT
  </text>
  <text x="100" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="2">
    .COM
  </text>
  <text x="100" y="102" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle">
    Seçilmiş En İyi Teklifler
  </text>
</svg>
